<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Detection Web App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background-color: #222;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            padding: 2.5rem;
            width: 100%;
            max-width: 600px;
            text-align: center;
            border: 1px solid #333;
        }
        h1 {
            color: #e74c3c;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .file-input-container {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        input[type="file"] {
            color: #fff;
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            cursor: pointer;
        }
        input[type="file"]::-webkit-file-upload-button {
            background-color: #e74c3c;
            color: #fff;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        input[type="file"]::-webkit-file-upload-button:hover {
            background-color: #c0392b;
        }
        .upload-button {
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.1s;
        }
        .upload-button:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }
        #result {
            margin-top: 2rem;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem;
            border-radius: 8px;
        }
        .analyzing {
            color: #f39c12;
        }
        .success {
            background-color: #2c3e50;
            color: #2ecc71;
        }
        .fire {
            background-color: #2c3e50;
            color: #e74c3c;
        }
        .no-fire {
            background-color: #2c3e50;
            color: #3498db;
        }
        .error {
            background-color: #2c3e50;
            color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>PyroShield 🔥</h1>
        <p>AI-Powered Fire Detection System</p>
        <div class="file-input-container">
            <input type="file" id="imageInput" accept="image/*">
            <button class="upload-button" onclick="uploadImage()">Analyze Image</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        async function uploadImage() {
            const fileInput = document.getElementById('imageInput');
            const resultDiv = document.getElementById('result');
            const file = fileInput.files[0];

            if (!file) {
                resultDiv.textContent = 'Please select a file first!';
                resultDiv.className = 'error';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            resultDiv.textContent = 'Analyzing...';
            resultDiv.className = 'analyzing';

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Prediction failed');
                }

                const data = await response.json();
                
                const label = data.label;
                const confidence = data.confidence.toFixed(2);
                
                resultDiv.textContent = `Prediction: ${label} (${confidence}%)`;
                resultDiv.className = label === 'fire' ? 'fire' : 'no-fire';

            } catch (error) {
                resultDiv.textContent = `Error: ${error.message}`;
                resultDiv.className = 'error';
                console.error('Error during prediction:', error);
            }
        }
    </script>
</body>
</html>
